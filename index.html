<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>riders.map — Scooter & Skate Spots</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background-color: #050505; }
        #map { width: 100%; height: 100%; z-index: 1; background-color: #050505 !important; }
        .leaflet-pane { background-color: #050505 !important; }
        .leaflet-container { background: #050505 !important; }
        
        .glass { 
            background: rgba(10, 10, 10, 0.65); 
            backdrop-filter: blur(25px) saturate(160%); 
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .leaflet-control-attribution { display: none !important; }
        .leaflet-popup-content-wrapper {
            background: rgba(15, 15, 15, 0.75) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border-radius: 20px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8) !important;
            padding: 4px;
        }
        .leaflet-popup-tip {
            background: rgba(15, 15, 15, 0.75) !important;
            backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }
        .leaflet-marker-icon {
            filter: brightness(0) invert(1) drop-shadow(0 0 6px rgba(255, 255, 255, 0.8)) !important;
        }
        .map-picking-mode {
            cursor: crosshair !important;
        }
    </style>
</head>
<body class="text-white selection:bg-white selection:text-black">

    <div id="map"></div>

    <div class="fixed top-4 left-4 right-4 z-50 flex flex-wrap justify-between items-center p-3 gap-y-2 rounded-2xl glass shadow-2xl">
        <div class="flex items-center gap-3">
            <span class="text-lg font-black tracking-tighter text-white">riders.map</span>
            <div class="h-4 w-[1px] bg-zinc-800"></div>
            <div class="flex items-center gap-1.5 cursor-pointer" onclick="openProfileModal()">
                <img id="userAvatarHeader" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2371717a'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z'/></svg>" class="w-6 h-6 rounded-full bg-zinc-900 border border-zinc-800 object-cover">
                <span id="userStatus" class="text-xs text-zinc-400 font-medium tracking-wide">Guest Mode</span>
            </div>
        </div>
        <div class="flex flex-wrap gap-1.5 sm:gap-2">
            <a href="mailto:compot2600@gmail.com" class="bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-white text-[11px] sm:text-xs px-2.5 py-1.5 rounded-xl font-bold border border-zinc-800 transition flex items-center">Contact</a>
            <button id="leaderboardBtn" onclick="openLeaderboardModal()" class="bg-zinc-900 hover:bg-zinc-800 text-white text-[11px] sm:text-xs px-2.5 py-1.5 rounded-xl font-bold border border-zinc-800 transition">Leaderboard</button>
            <button id="savedBtn" onclick="toggleSavedModal()" class="hidden bg-zinc-900 hover:bg-zinc-800 text-white text-[11px] sm:text-xs px-2.5 py-1.5 rounded-xl font-bold border border-zinc-800 transition">Saved</button>
            <button id="authBtn" onclick="openAuthModal()" class="bg-white hover:bg-zinc-200 text-black text-[11px] sm:text-xs px-3 sm:px-4 py-1.5 rounded-xl font-bold transition shadow-lg">Sign In / Up</button>
        </div>
    </div>

    <div id="locationPickerHint" class="hidden fixed top-32 sm:top-24 left-1/2 transform -translate-x-1/2 z-50 bg-white text-black px-4 py-2.5 rounded-xl font-bold text-xs shadow-2xl tracking-wide flex items-center gap-2 animate-bounce">
        <span>Click anywhere on the map to set spot location...</span>
        <button onclick="cancelLocationPicking()" class="text-zinc-400 hover:text-black font-black ml-1">Cancel</button>
    </div>

    <div class="fixed bottom-6 left-6 z-50 flex gap-2 p-1.5 rounded-2xl glass shadow-xl">
        <button id="filter-all" onclick="setFilter('all')" class="bg-white text-black text-xs px-3 py-2 rounded-xl font-bold transition">All</button>
        <button id="filter-street" onclick="setFilter('street')" class="bg-zinc-900 hover:bg-zinc-800 text-zinc-400 text-xs px-3 py-2 rounded-xl font-bold transition">Street</button>
        <button id="filter-park" onclick="setFilter('park')" class="bg-zinc-900 hover:bg-zinc-800 text-zinc-400 text-xs px-3 py-2 rounded-xl font-bold transition">Park</button>
    </div>

    <button id="addSpotBtn" onclick="startLocationPicking()" class="hidden fixed bottom-6 right-6 z-50 w-14 h-14 bg-white hover:bg-zinc-200 text-black rounded-full flex items-center justify-center text-3xl font-light shadow-2xl transition-all transform hover:scale-105 active:scale-95 border border-white/20">+</button>

    <div id="customAlertModal" class="fixed inset-0 z-[300] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="w-full max-w-xs p-5 rounded-2xl glass text-center shadow-2xl border border-white/10">
            <p id="customAlertText" class="text-sm font-medium text-zinc-200 mb-4 break-words"></p>
            <button id="customAlertBtn" class="w-full bg-white hover:bg-zinc-200 text-black font-bold p-2.5 rounded-xl text-xs transition shadow-lg">OK</button>
        </div>
    </div>

    <div id="customConfirmModal" class="fixed inset-0 z-[300] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="w-full max-w-xs p-5 rounded-2xl glass text-center shadow-2xl border border-white/10">
            <p id="customConfirmText" class="text-sm font-medium text-zinc-200 mb-4 break-words"></p>
            <div class="flex gap-2">
                <button id="customConfirmCancelBtn" class="flex-1 bg-zinc-900 hover:bg-zinc-800 text-zinc-400 font-bold p-2.5 rounded-xl text-xs transition border border-zinc-800">Cancel</button>
                <button id="customConfirmOkBtn" class="flex-1 bg-white hover:bg-zinc-200 text-black font-bold p-2.5 rounded-xl text-xs transition shadow-lg">Confirm</button>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="w-full max-w-sm p-6 rounded-3xl glass shadow-2xl">
            <div class="flex border-b border-zinc-800 mb-4 text-sm font-bold">
                <button id="tabSignIn" onclick="switchAuthTab('signin')" class="flex-1 pb-2 border-b-2 border-white text-white">Sign In</button>
                <button id="tabSignUp" onclick="switchAuthTab('signup')" class="flex-1 pb-2 border-b-2 border-transparent text-zinc-500 hover:text-zinc-300">Sign Up</button>
            </div>
            <input type="text" id="usernameInput" placeholder="Login ID (cannot be changed)" class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl p-3 text-sm text-white mb-3 focus:outline-none focus:border-white transition">
            <input type="password" id="passwordInput" placeholder="Password" class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl p-3 text-sm text-white mb-2 focus:outline-none focus:border-white transition">
            <p id="authError" class="text-zinc-400 text-xs font-semibold mb-3 hidden"></p>
            <button onclick="handleAuth()" class="w-full bg-white hover:bg-zinc-200 text-black font-bold p-3 rounded-xl text-sm transition mb-2 shadow-lg">Submit</button>
            <button onclick="closeModal('authModal')" class="w-full bg-zinc-900 hover:bg-zinc-800 text-zinc-400 font-medium p-3 rounded-xl text-sm transition">Explore as Guest</button>
        </div>
    </div>

    <div id="addSpotModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="w-full max-w-sm p-6 rounded-3xl glass shadow-2xl">
            <h2 id="modalSpotTitle" class="text-xl font-black tracking-tight mb-1 text-white">Add New Spot</h2>
            
            <div class="bg-amber-400/20 text-amber-300 border border-amber-400/30 text-xs font-semibold px-3 py-2 rounded-xl mb-4 flex items-center gap-1.5 backdrop-blur-sm">
                <span class="text-sm shrink-0 text-amber-400">⚠</span>
                <span>Unverified spots expire in 5 days!</span>
            </div>
            
            <input type="text" id="spotNameInput" placeholder="Spot Name (e.g., Main Plaza)" class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl p-3 text-sm text-white mb-3 focus:outline-none focus:border-white transition">
            
            <label class="block text-zinc-400 text-xs mb-1.5 font-bold">Select Spot Type:</label>
            <select id="spotTypeInput" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-white mb-4 focus:outline-none focus:border-white transition">
                <option value="" disabled selected>-- Choose type --</option>
                <option value="street">Street (Rails, Ledges, Stairs)</option>
                <option value="park">Park (Quarters, Ramps, Bowls)</option>
                <option value="both">Both (Hybrid Area)</option>
            </select>

            <div id="coordsIndicator" class="text-xs text-zinc-300 font-mono mb-4 bg-zinc-900/50 p-2 rounded-lg border border-zinc-800">Location selected</div>
            <button id="submitSpotBtn" onclick="handleCreateSpot()" class="w-full bg-white hover:bg-zinc-200 text-black font-bold p-3 rounded-xl text-sm transition mb-2">Save Spot</button>
            <button onclick="closeModal('addSpotModal')" class="w-full bg-zinc-900 hover:bg-zinc-700 text-zinc-400 font-medium p-3 rounded-xl text-sm transition">Cancel</button>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="w-full max-w-sm p-6 rounded-3xl glass shadow-2xl">
            <h2 class="text-xl font-black tracking-tight text-white mb-1">Edit Profile</h2>
            <p class="text-zinc-500 text-xs mb-4">Customize how you look on the map</p>
            
            <div class="flex justify-center mb-4">
                <img id="profileAvatarPreview" src="" class="w-20 h-20 rounded-full border border-zinc-800 bg-zinc-900 object-cover">
            </div>

            <input type="text" id="profileNicknameInput" placeholder="Display Name / Nickname" class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl p-3 text-sm text-white mb-3 focus:outline-none">
            
            <label class="block w-full text-center bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-xs text-zinc-400 font-bold py-3 rounded-xl cursor-pointer mb-4 transition">
                Upload Profile Photo
                <input type="file" id="profileAvatarFile" accept="image/*" class="hidden" onchange="handleProfileAvatarSelect(event)">
            </label>
            
            <button onclick="saveProfileChanges()" class="w-full bg-white hover:bg-zinc-200 text-black font-bold p-3 rounded-xl text-sm transition mb-2">Save Profile</button>
            <button onclick="closeModal('profileModal')" class="w-full bg-zinc-900 hover:bg-zinc-800 text-zinc-400 font-medium p-3 rounded-xl text-sm transition">Close</button>
        </div>
    </div>

    <div id="leaderboardModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="w-full max-w-sm p-6 rounded-3xl glass shadow-2xl max-h-[75vh] flex flex-col">
            <h2 class="text-xl font-black tracking-tight text-white mb-1">Top Scouts</h2>
            <p class="text-zinc-500 text-xs mb-4">Ranked by verified spots created</p>
            <div id="leaderboardList" class="flex-1 overflow-y-auto space-y-2 text-sm pr-1"></div>
            <button onclick="closeModal('leaderboardModal')" class="w-full bg-zinc-900 hover:bg-zinc-800 text-zinc-400 font-medium p-3 rounded-xl text-sm transition mt-4">Close</button>
        </div>
    </div>

    <div id="savedModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="w-full max-w-sm p-6 rounded-3xl glass shadow-2xl max-h-[75vh] flex flex-col">
            <h2 class="text-xl font-black tracking-tight text-white mb-4">Saved Spots</h2>
            <div id="savedList" class="flex-1 overflow-y-auto space-y-2 pr-1 text-sm"></div>
            <button onclick="closeModal('savedModal')" class="w-full bg-zinc-900 hover:bg-zinc-800 text-zinc-400 font-medium p-3 rounded-xl text-sm transition mt-4">Close</button>
        </div>
    </div>

    <div id="photoViewerModal" class="fixed inset-0 z-[200] hidden flex flex-col items-center justify-center p-4 bg-black/90 backdrop-blur-lg" onclick="closeModal('photoViewerModal')">
        <button class="absolute top-6 right-6 text-white text-3xl font-light hover:text-zinc-400">&times;</button>
        <div class="max-w-4xl max-h-[85vh] flex items-center justify-center" onclick="event.stopPropagation()">
            <img id="viewedImage" src="" class="max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl border border-zinc-800/50">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBe6oY-YNkeM8Yi_HUWe8qfNBeM2v3oCtA",
            authDomain: "riders-map-47.firebaseapp.com",
            projectId: "riders-map-47",
            storageBucket: "riders-map-47.firebasestorage.app",
            messagingSenderId: "21069707310",
            appId: "1:21069707310:web:bd48103fca0be95b5547bf",
            measurementId: "G-25B6W7C1VH"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        const FIREBASE_URL = `https://${firebaseConfig.projectId}-default-rtdb.europe-west1.firebasedatabase.app`;

        const DEFAULT_AVATAR = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2371717a'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z'/></svg>";

        window.openAuthModal = openAuthModal;
        window.openAddSpotModal = openAddSpotModal;
        window.startLocationPicking = startLocationPicking;
        window.cancelLocationPicking = cancelLocationPicking;
        window.closeModal = closeModal;
        window.switchAuthTab = switchAuthTab;
        window.handleAuth = handleAuth;
        window.handleCreateSpot = handleCreateSpot;
        window.toggleSavedModal = toggleSavedModal;
        window.toggleSaveSpot = toggleSaveSpot;
        window.flyToSpot = flyToSpot;
        window.handleFileSelect = handleFileSelect;
        window.handleProfileAvatarSelect = handleProfileAvatarSelect;
        window.submitPopupReview = submitPopupReview;
        window.openPhotoViewer = openPhotoViewer;
        window.adminApproveInClick = adminApproveInClick;
        window.adminDeleteInClick = adminDeleteInClick;
        window.setFilter = setFilter;
        window.openLeaderboardModal = openLeaderboardModal;
        window.openProfileModal = openProfileModal;
        window.saveProfileChanges = saveProfileChanges;
        window.openEditSpotModal = openEditSpotModal;
        window.deleteReview = deleteReview;

        let map, currentMarkerCoords = null;
        let currentUser = JSON.parse(localStorage.getItem('scooteUser')) || null;
        let authMode = 'signin'; 
        let tempBase64Photo = "";
        let tempProfileAvatarBase64 = "";
        let currentFilter = 'all';
        let editingSpotKey = null; 
        let isPickingLocation = false;
        
        let spots = [];
        let profiles = {};
        let savedSpots = JSON.parse(localStorage.getItem('savedSpotsData')) || {};

        function customAlert(message) {
            return new Promise((resolve) => {
                document.getElementById('customAlertText').innerText = message;
                const modal = document.getElementById('customAlertModal');
                modal.style.display = 'flex';
                document.getElementById('customAlertBtn').onclick = function() {
                    modal.style.display = 'none';
                    resolve();
                };
            });
        }

        function customConfirm(message) {
            return new Promise((resolve) => {
                document.getElementById('customConfirmText').innerText = message;
                const modal = document.getElementById('customConfirmModal');
                modal.style.display = 'flex';
                
                document.getElementById('customConfirmOkBtn').onclick = function() {
                    modal.style.display = 'none';
                    resolve(true);
                };
                document.getElementById('customConfirmCancelBtn').onclick = function() {
                    modal.style.display = 'none';
                    resolve(false);
                };
            });
        }

        function getStarsHTML(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += '<span class="text-amber-400">★</span>';
                } else {
                    stars += '<span class="text-zinc-600">★</span>';
                }
            }
            return stars;
        }

        async function loadDataFromFirebase() {
            try {
                const spotRes = await fetch(`${FIREBASE_URL}/spots.json`);
                const spotData = await spotRes.json();
                spots = spotData ? Object.keys(spotData).map(key => ({ firebaseKey: key, ...spotData[key] })) : [];

                const profRes = await fetch(`${FIREBASE_URL}/profiles.json`);
                const profData = await profRes.json();
                profiles = profData || {};

                updateHeaderProfileUI();
                renderMarkers();
            } catch (e) {
                console.error("Database loading error:", e);
            }
        }

        async function syncSpotToFirebase(spot) {
            if (spot.firebaseKey) {
                await fetch(`${FIREBASE_URL}/spots/${spot.firebaseKey}.json`, {
                    method: 'PUT',
                    body: JSON.stringify(spot)
                });
            } else {
                const response = await fetch(`${FIREBASE_URL}/spots.json`, {
                    method: 'POST',
                    body: JSON.stringify(spot)
                });
                const resData = await response.json();
                spot.firebaseKey = resData.name;
            }
        }

        async function deleteSpotFromFirebase(firebaseKey) {
            await fetch(`${FIREBASE_URL}/spots/${firebaseKey}.json`, { method: 'DELETE' });
        }

        function initMap() {
            map = L.map('map', { zoomControl: false, worldCopyJump: true }).setView([55.7558, 37.6173], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            document.getElementById('map').style.filter = "grayscale(100%) contrast(110%)";
            
            map.on('click', function(e) {
                if (isPickingLocation) {
                    executeLocationPicked(e.latlng);
                }
            });

            map.on('contextmenu', function(e) {
                if(!currentUser) return;
                executeLocationPicked(e.latlng);
            });

            loadDataFromFirebase();
            setInterval(loadDataFromFirebase, 10000);
        }

        function startLocationPicking() {
            if (!currentUser) return;
            isPickingLocation = true;
            document.getElementById('map').classList.add('map-picking-mode');
            document.getElementById('locationPickerHint').classList.remove('hidden');
            document.getElementById('addSpotBtn').classList.add('hidden');
        }

        function cancelLocationPicking() {
            isPickingLocation = false;
            document.getElementById('map').classList.remove('map-picking-mode');
            document.getElementById('locationPickerHint').classList.add('hidden');
            document.getElementById('addSpotBtn').classList.remove('hidden');
        }

        function executeLocationPicked(latlng) {
            cancelLocationPicking();
            currentMarkerCoords = latlng;
            editingSpotKey = null;
            document.getElementById('modalSpotTitle').innerText = "Add New Spot";
            document.getElementById('coordsIndicator').innerText = `Location: ${latlng.lat.toFixed(4)}, ${latlng.lng.toFixed(4)}`;
            openAddSpotModal();
        }

        function setFilter(type) {
            currentFilter = type;
            ['all', 'street', 'park'].forEach(t => {
                const b = document.getElementById(`filter-${t}`);
                if(t === type) {
                    b.className = "bg-white text-black text-xs px-3 py-2 rounded-xl font-bold transition";
                } else {
                    b.className = "bg-zinc-900 hover:bg-zinc-800 text-zinc-400 text-xs px-3 py-2 rounded-xl font-bold transition";
                }
            });
            renderMarkers();
        }

        function renderMarkers() {
            map.eachLayer((layer) => { if (layer instanceof L.Marker) map.removeLayer(layer); });

            const fiveDaysInMs = 5 * 24 * 60 * 60 * 1000;
            let filtered = spots.filter(spot => {
                if (!spot.approved && (Date.now() - spot.createdAt > fiveDaysInMs)) {
                    if (spot.firebaseKey) deleteSpotFromFirebase(spot.firebaseKey);
                    return false;
                }
                
                const spotType = spot.type || 'both';

                if (currentFilter !== 'all') {
                    if (spotType !== currentFilter && spotType !== 'both') return false;
                }
                return true;
            });

            filtered.forEach(spot => {
                const marker = L.marker([spot.lat, spot.lng]).addTo(map);
                
                let reviewsHTML = '';
                if(spot.reviews) {
                    const reviewEntries = Array.isArray(spot.reviews) ? spot.reviews.entries() : Object.entries(spot.reviews);
                    
                    for (const [index, r] of reviewEntries) {
                        if (!r) continue;
                        const rName = profiles[r.user]?.nickname || r.user;
                        const rAvatar = profiles[r.user]?.avatarUrl || DEFAULT_AVATAR;
                        
                        let deleteReviewBtnHTML = '';
                        if (currentUser && (r.user === currentUser || currentUser.toLowerCase() === 'riders.map')) {
                            deleteReviewBtnHTML = `<button onclick="deleteReview('${spot.firebaseKey}', ${index})" class="text-zinc-500 hover:text-red-400 font-bold ml-1.5 transition text-[10px]" title="Delete review">x</button>`;
                        }

                        reviewsHTML += `
                            <div class="mt-2 border-t border-zinc-800 pt-1.5 text-[11px]">
                                <div class="flex justify-between items-center text-zinc-400 font-bold">
                                    <div class="flex items-center gap-1">
                                        <img src="${rAvatar}" class="w-3.5 h-3.5 rounded-full bg-zinc-900 object-cover border border-zinc-800">
                                        <span>@${rName}</span>
                                        ${deleteReviewBtnHTML}
                                    </div>
                                    <div class="text-[12px] flex items-center">${getStarsHTML(r.rating)}</div>
                                </div>
                                <p class="text-zinc-200 m-0 mt-0.5 pl-4.5">${r.text}</p>
                                ${r.photo ? `<img src="${r.photo}" onclick="openPhotoViewer('${r.photo}')" class="mt-1 rounded-lg max-h-20 w-full object-cover border border-zinc-800 cursor-pointer hover:opacity-80 transition"/>` : ''}
                            </div>`;
                    }
                }

                let isSaved = false;
                if (currentUser && savedSpots[currentUser]) {
                    isSaved = savedSpots[currentUser].includes(spot.id);
                }

                const displayCreatorName = profiles[spot.creator]?.nickname || spot.creator;
                const spotType = spot.type || 'both';

                let editBtnHTML = '';
                if (currentUser && spot.creator === currentUser && !spot.approved) {
                    editBtnHTML = `<button onclick="openEditSpotModal('${spot.firebaseKey}')" class="w-full mt-2 bg-zinc-800 border border-zinc-700 text-white font-bold py-1 rounded text-[10px] hover:bg-zinc-700 transition">Edit Spot Details</button>`;
                }

                let popupContent = `
                    <div class="w-56 p-1 text-white">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-1.5">
                                <h3 class="font-black text-sm tracking-tight m-0">${spot.name}</h3>
                                ${currentUser ? `
                                    <button onclick="toggleSaveSpot(${spot.id})" class="text-xs focus:outline-none transition transform active:scale-75 font-bold" title="Save Spot">
                                        ${isSaved ? '★' : '☆'}
                                    </button>
                                ` : ''}
                            </div>
                            <span class="text-[9px] uppercase tracking-wider px-1.5 py-0.5 rounded ${spot.approved ? 'bg-zinc-800 text-white' : 'bg-zinc-900 text-zinc-500'}">${spot.approved ? 'Verified' : 'Pending'}</span>
                        </div>
                        <div class="flex justify-between items-center mt-1">
                             <p class="text-zinc-500 text-[10px] m-0">By @${displayCreatorName}</p>
                             <span class="text-[9px] text-zinc-400 bg-zinc-900 border border-zinc-800 px-1 rounded font-bold uppercase">${spotType}</span>
                        </div>
                        
                        ${!spot.approved ? `<p class="text-zinc-400 text-[10px] mt-1 bg-zinc-900/80 p-1 rounded border border-zinc-800">Proof Link: <a href="https://forms.gle/ZR2rf6i5bfqt2AEA7" target="_blank" class="underline text-white font-bold">Submit Form</a></p>` : ''}
                        
                        ${currentUser && currentUser.toLowerCase() === 'riders.map' ? `
                            <div class="flex gap-1 mt-2 border-t border-zinc-800 pt-2">
                                ${!spot.approved ? `<button onclick="adminApproveInClick('${spot.firebaseKey}')" class="flex-1 bg-white text-black font-bold text-[10px] py-1 rounded hover:bg-zinc-200 transition">Verify</button>` : ''}
                                <button onclick="adminDeleteInClick('${spot.firebaseKey}')" class="flex-1 bg-zinc-800 text-zinc-300 font-bold text-[10px] py-1 rounded hover:bg-zinc-700 transition">Delete</button>
                            </div>
                        ` : ''}

                        ${editBtnHTML}

                        <div class="max-h-24 overflow-y-auto mt-2 pr-0.5">${reviewsHTML || '<p class="text-zinc-600 text-[11px] m-0 mt-1">No reviews yet.</p>'}</div>

                        ${currentUser ? `
                            <div class="mt-2 pt-2 border-t border-zinc-800">
                                <select id="popRating-${spot.id}" class="w-full bg-zinc-900 border border-zinc-800 rounded text-[10px] p-1 text-white mb-1 focus:outline-none">
                                    <option value="5">★★★★★ (5/5)</option>
                                    <option value="4">★★★★☆ (4/5)</option>
                                    <option value="3">★★★☆☆ (3/5)</option>
                                    <option value="2">★★☆☆☆ (2/5)</option>
                                    <option value="1">★☆☆☆☆ (1/5)</option>
                                </select>
                                <textarea id="popText-${spot.id}" placeholder="Write a review..." class="w-full h-10 bg-zinc-900 border border-zinc-800 rounded text-[10px] p-1 text-white mb-1 focus:outline-none resize-none"></textarea>
                                
                                <label class="block w-full text-center bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-[9px] text-zinc-400 py-1 rounded cursor-pointer mb-1 transition">
                                    Choose File Photo
                                    <input type="file" id="popFile-${spot.id}" accept="image/*" class="hidden" onchange="handleFileSelect(event, ${spot.id})">
                                </label>
                                <div id="filePreviewContainer-${spot.id}" class="hidden mb-1"><img id="filePreview-${spot.id}" class="h-10 w-full object-cover rounded border border-zinc-700"/></div>

                                <button onclick="submitPopupReview('${spot.firebaseKey}', ${spot.id})" class="w-full bg-white text-black font-bold py-1 rounded text-[10px] hover:bg-zinc-200 transition">Send</button>
                            </div>
                        ` : ''}
                    </div>
                `;
                
                marker.bindPopup(popupContent, {
                    autoClose: false,
                    closeOnClick: false
                });
            });
        }

        async function deleteReview(firebaseKey, reviewIndex) {
            const confirmed = await customConfirm("Are you sure you want to delete this review?");
            if (!confirmed) return;
            
            const spot = spots.find(s => s.firebaseKey === firebaseKey);
            if (spot && spot.reviews) {
                spot.reviews.splice(reviewIndex, 1);
                map.closePopup();
                await syncSpotToFirebase(spot);
                loadDataFromFirebase();
            }
        }

        function openEditSpotModal(firebaseKey) {
            map.closePopup();
            const spot = spots.find(s => s.firebaseKey === firebaseKey);
            if (!spot) return;
            editingSpotKey = firebaseKey;
            document.getElementById('modalSpotTitle').innerText = "Edit Spot Details";
            document.getElementById('spotNameInput').value = spot.name;
            document.getElementById('spotTypeInput').value = spot.type || "both";
            document.getElementById('coordsIndicator').innerText = `Location locked (cannot move)`;
            openAddSpotModal();
        }

        function openProfileModal() {
            if (!currentUser) return openAuthModal();
            const prof = profiles[currentUser] || {};
            document.getElementById('profileNicknameInput').value = prof.nickname || currentUser;
            
            tempProfileAvatarBase64 = prof.avatarUrl || DEFAULT_AVATAR;
            document.getElementById('profileAvatarPreview').src = tempProfileAvatarBase64;
            document.getElementById('profileModal').style.display = 'flex';
        }

        function handleProfileAvatarSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                tempProfileAvatarBase64 = e.target.result;
                document.getElementById('profileAvatarPreview').src = tempProfileAvatarBase64;
            }
            reader.readAsDataURL(file);
        }

        async function saveProfileChanges() {
            const nick = document.getElementById('profileNicknameInput').value.trim();
            if(!nick) return customAlert("Nickname cannot be empty!");

            const newProfile = {
                nickname: nick,
                avatarUrl: tempProfileAvatarBase64
            };

            await fetch(`${FIREBASE_URL}/profiles/${currentUser}.json`, {
                method: 'PUT',
                body: JSON.stringify(newProfile)
            });

            closeModal('profileModal');
            loadDataFromFirebase();
            await customAlert("Profile updated!");
        }

        function updateHeaderProfileUI() {
            if(currentUser) {
                const prof = profiles[currentUser] || {};
                document.getElementById('userStatus').innerText = prof.nickname || currentUser;
                document.getElementById('userAvatarHeader').src = prof.avatarUrl || DEFAULT_AVATAR;
            } else {
                document.getElementById('userStatus').innerText = "Guest Mode";
                document.getElementById('userAvatarHeader').src = DEFAULT_AVATAR;
            }
        }

        function openLeaderboardModal() {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';

            let score = {};
            spots.forEach(spot => {
                if(spot.approved && spot.creator) {
                    score[spot.creator] = (score[spot.creator] || 0) + 1;
                }
            });

            let sorted = Object.keys(score).map(user => {
                return { user: user, count: score[user] };
            }).sort((a,b) => b.count - a.count);

            if(sorted.length === 0) {
                list.innerHTML = '<p class="text-zinc-500 text-xs">No verified scouts yet.</p>';
            } else {
                sorted.forEach((item, index) => {
                    const uProf = profiles[item.user] || {};
                    const name = uProf.nickname || item.user;
                    const av = uProf.avatarUrl || DEFAULT_AVATAR;
                    
                    list.innerHTML += `
                        <div class="flex justify-between items-center p-2.5 bg-zinc-900 border border-zinc-800 rounded-xl">
                            <div class="flex items-center gap-2">
                                <span class="font-mono text-zinc-500 w-4">${index + 1}.</span>
                                <img src="${av}" class="w-6 h-6 rounded-full bg-zinc-900 border border-zinc-800 object-cover">
                                <p class="font-bold text-white text-xs">@${name}</p>
                            </div>
                            <span class="text-xs font-black text-white bg-zinc-800 border border-zinc-700 px-2 py-0.5 rounded-lg">${item.count} spots</span>
                        </div>
                    `;
                });
            }
            document.getElementById('leaderboardModal').style.display = 'flex';
        }

        function openPhotoViewer(photoSrc) {
            document.getElementById('viewedImage').src = photoSrc;
            document.getElementById('photoViewerModal').style.display = 'flex';
        }

        function toggleSaveSpot(spotId) {
            if (!currentUser) return;
            if (!savedSpots[currentUser]) savedSpots[currentUser] = [];
            
            const index = savedSpots[currentUser].indexOf(spotId);
            if (index > -1) {
                savedSpots[currentUser].splice(index, 1);
            } else {
                savedSpots[currentUser].push(spotId);
            }
            
            localStorage.setItem('savedSpotsData', JSON.stringify(savedSpots));
            map.closePopup();
            renderMarkers();
        }

        function toggleSavedModal() {
            const modal = document.getElementById('savedModal');
            const list = document.getElementById('savedList');
            list.innerHTML = '';

            if (!currentUser || !savedSpots[currentUser] || savedSpots[currentUser].length === 0) {
                list.innerHTML = '<p class="text-zinc-500 text-xs">No saved spots yet.</p>';
            } else {
                savedSpots[currentUser].forEach(id => {
                    const spot = spots.find(s => s.id === id);
                    if (spot) {
                        list.innerHTML += `
                            <div class="flex justify-between items-center p-2.5 bg-zinc-900 border border-zinc-800 rounded-xl">
                                <div onclick="flyToSpot(${spot.lat}, ${spot.lng})" class="cursor-pointer flex-1">
                                    <p class="font-bold text-white text-xs">${spot.name}</p>
                                    <p class="text-[10px] text-zinc-500">By @${profiles[spot.creator]?.nickname || spot.creator}</p>
                                </div>
                                <button onclick="toggleSaveSpot(${spot.id}); toggleSavedModal(); toggleSavedModal();" class="text-xs text-zinc-400 hover:text-white ml-2">x</button>
                            </div>
                        `;
                    }
                });
            }
            modal.style.display = 'flex';
        }

        function flyToSpot(lat, lng) {
            map.flyTo([lat, lng], 15);
            closeModal('savedModal');
        }

        function handleFileSelect(event, spotId) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                tempBase64Photo = e.target.result;
                document.getElementById(`filePreview-${spotId}`).src = tempBase64Photo;
                document.getElementById(`filePreviewContainer-${spotId}`).classList.remove('hidden');
            }
            reader.readAsDataURL(file);
        }

        async function submitPopupReview(firebaseKey, spotId) {
            const text = document.getElementById(`popText-${spotId}`).value.trim();
            const rating = parseInt(document.getElementById(`popRating-${spotId}`).value);
            if(!text) return customAlert("Write a review text!");

            const spot = spots.find(s => s.firebaseKey === firebaseKey);
            if(spot) {
                if(!spot.reviews) spot.reviews = [];
                spot.reviews.push({ user: currentUser, rating: rating, text: text, photo: tempBase64Photo });
                
                tempBase64Photo = ""; 
                map.closePopup();
                await syncSpotToFirebase(spot);
                loadDataFromFirebase();
                await customAlert("Review posted!");
            }
        }

        async function adminApproveInClick(firebaseKey) {
            const spot = spots.find(s => s.firebaseKey === firebaseKey);
            if(spot) {
                spot.approved = true;
                map.closePopup();
                await syncSpotToFirebase(spot);
                loadDataFromFirebase();
            }
        }

        async function adminDeleteInClick(firebaseKey) {
            const confirmed = await customConfirm("Delete this spot permanently?");
            if(confirmed) {
                map.closePopup();
                await deleteSpotFromFirebase(firebaseKey);
                loadDataFromFirebase();
            }
        }

        function openAuthModal() { document.getElementById('authModal').style.display = 'flex'; }
        function openAddSpotModal() { 
            document.getElementById('addSpotModal').style.display = 'flex'; 
        }
        function closeModal(id) { 
            document.getElementById(id).style.display = 'none'; 
            if(id === 'addSpotModal') {
                currentMarkerCoords = null;
                editingSpotKey = null;
                document.getElementById('spotNameInput').value = '';
                document.getElementById('spotTypeInput').value = '';
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") {
                cancelLocationPicking();
                closeModal('authModal');
                closeModal('addSpotModal');
                closeModal('savedModal');
                closeModal('photoViewerModal');
                closeModal('profileModal');
                closeModal('leaderboardModal');
                document.getElementById('customAlertModal').style.display = 'none';
                document.getElementById('customConfirmModal').style.display = 'none';
            }
        });

        function switchAuthTab(mode) {
            authMode = mode;
            const tabIn = document.getElementById('tabSignIn');
            const tabUp = document.getElementById('tabSignUp');
            document.getElementById('authError').classList.add('hidden');
            if (mode === 'signin') {
                tabIn.className = "flex-1 pb-2 border-b-2 border-white text-white font-bold text-center";
                tabUp.className = "flex-1 pb-2 border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 text-center";
            } else {
                tabUp.className = "flex-1 pb-2 border-b-2 border-white text-white font-bold text-center";
                tabIn.className = "flex-1 pb-2 border-b-2 border-transparent text-zinc-500 hover:text-zinc-300 text-center";
            }
        }

        async function handleAuth() {
            const user = document.getElementById('usernameInput').value.trim().replace(/[^a-zA-Z0-9]/g, ""); 
            const pass = document.getElementById('passwordInput').value.trim();
            if(!user || !pass) return showAuthError("Fill in all fields!");

            const adminUser = "riders.map";
            const adminPass = "Th3B0ys@r3C00l";

            let registeredUsers = JSON.parse(localStorage.getItem('scooterUsers')) || [];

            if (authMode === 'signup') {
                if (user.toLowerCase() === adminUser.toLowerCase() || registeredUsers.find(u => u.username.toLowerCase() === user.toLowerCase())) {
                    showAuthError("Username already taken!");
                    return;
                }
                registeredUsers.push({ username: user, password: pass });
                localStorage.setItem('scooterUsers', JSON.stringify(registeredUsers));
                await customAlert("Account created!");
            } else {
                if (user.toLowerCase() === adminUser.toLowerCase()) {
                    if (pass !== adminPass) return showAuthError("Invalid admin password!");
                } else {
                    const existingUser = registeredUsers.find(u => u.username.toLowerCase() === user.toLowerCase());
                    if (!existingUser || existingUser.password !== pass) return showAuthError("Invalid login details!");
                }
            }

            currentUser = user;
            localStorage.setItem('scooteUser', JSON.stringify(currentUser));
            updateAuthUI();
            closeModal('authModal');
            document.getElementById('usernameInput').value = '';
            document.getElementById('passwordInput').value = '';
        }

        function showAuthError(msg) {
            const errBox = document.getElementById('authError');
            errBox.innerText = msg; errBox.classList.remove('hidden');
        }

        function updateAuthUI() {
            if(currentUser) {
                document.getElementById('authBtn').innerText = "Log Out";
                document.getElementById('authBtn').onclick = () => { currentUser = null; localStorage.removeItem('scooteUser'); updateAuthUI(); updateHeaderProfileUI(); };
                document.getElementById('addSpotBtn').classList.remove('hidden');
                document.getElementById('savedBtn').classList.remove('hidden');
            } else {
                document.getElementById('authBtn').innerText = "Sign In / Up";
                document.getElementById('authBtn').onclick = openAuthModal;
                document.getElementById('addSpotBtn').classList.add('hidden');
                document.getElementById('savedBtn').classList.add('hidden');
            }
            loadDataFromFirebase();
        }

        async function handleCreateSpot() {
            const name = document.getElementById('spotNameInput').value.trim();
            const type = document.getElementById('spotTypeInput').value;
            
            if(!name) return customAlert("Enter spot name!");
            if(!type) return customAlert("Please choose spot type (Street/Park/Both)!");

            if (editingSpotKey) {
                const spot = spots.find(s => s.firebaseKey === editingSpotKey);
                if (spot) {
                    spot.name = name;
                    spot.type = type;
                    await syncSpotToFirebase(spot);
                    await customAlert("Spot details updated!");
                }
            } else {
                const newSpot = {
                    id: Date.now(),
                    lat: currentMarkerCoords.lat,
                    lng: currentMarkerCoords.lng,
                    name: name,
                    type: type,
                    creator: currentUser,
                    createdAt: Date.now(),
                    approved: (currentUser.toLowerCase() === 'riders.map'), 
                    reviews: []
                };
                await syncSpotToFirebase(newSpot);
                await customAlert("Spot created!");
            }

            closeModal('addSpotModal');
            loadDataFromFirebase();
        }

        window.onload = () => { initMap(); updateAuthUI(); };
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(err) {
                console.error('ServiceWorker registration failed: ', err);
            });
        }
    </script>
</body>
</html>
